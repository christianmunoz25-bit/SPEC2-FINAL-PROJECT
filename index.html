<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="start-screen" class="screen active">
            <h1>Quiz Application</h1>
            <input id="player-name" placeholder="Enter your name">
            <button id="start-btn">Start</button>
            <p id="name-error" class="hidden">Enter your name first.</p>
        </div>

        <div id="category-screen" class="screen">
            <h1>Hello <span id="display-name"></span></h1>
            <p>Select Category</p>
            <button class="category-btn" data-category="Science">Science</button>
            <button class="category-btn" data-category="History">History</button>
            <button class="category-btn" 
            data-category="Pop Culture">Pop Culture</button>
        </div>

        <div id="quiz-screen" class="screen">
            <h3 id="question-tracker"></h3>
            <div class="question-box">
                <h2 id="question-text"></h2>
                <div id="choices"></div>
            </div>
            <p id="feedback"></p>
        </div>

        <div id="result-screen" class="screen">
            <h2>Quiz Complete</h2>
            <p id="result-name"></p>
            <h1 id="score"></h1>
            <h3>Breakdown</h3>
            <ul id="breakdown"></ul>
            <button id="restart">Play Again</button>
        </div>
    </div>

    <script src="question1.js"></script>
    <script src="question2.js   "></script>
</body>
</html>
